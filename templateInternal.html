<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document Title</title>
        <meta name="robots" content="noindex, nofollow" />
        <style>
            body {
                margin: 0;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Oxygen,
                    Ubuntu,
                    Cantarell,
                    "Open Sans",
                    "Helvetica Neue",
                    sans-serif;
                background-color: #f4f4f4;
                color: #333;
                padding: 0;
            }

            .container {
                max-width: 700px;
                margin: 2rem auto;
                background-color: #fff;
                padding: 2rem;
                border-radius: 8px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }

            h1 {
                font-size: 1.5rem;
                margin-top: 0;
                color: #00539b;
            }

            h2 {
                font-size: 1.25rem;
                color: #003d73;
                margin-top: 1.5rem;
            }

            h3 {
                font-size: 1.1rem;
                color: #333;
                margin-top: 1.25rem;
            }

            p {
                line-height: 1.6;
                margin-bottom: 1rem;
            }

            ul {
                margin: 1rem 0;
                padding-left: 1.25rem;
            }

            ul li {
                margin-bottom: 0.5rem;
            }

            .footer-note {
                font-size: 0.9rem;
                color: #555;
                margin-top: 2rem;
                text-align: center;
            }

            @media (max-width: 600px) {
                .container {
                    margin: 1rem;
                    padding: 1.5rem;
                }
                h1 {
                    font-size: 1.3rem;
                }
                h2 {
                    font-size: 1.1rem;
                }
                h3 {
                    font-size: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Document Title</h1>

            <p>Intro paragraph goes here.</p>

            <h2>Section Heading</h2>
            <p>Supporting content or explanation here.</p>

            <h3>Subsection Heading</h3>
            <p>Additional details or notes can go here.</p>

            <ul>
                <li>First point</li>
                <li>Second point</li>
                <li>Third point</li>
            </ul>

            <div class="footer-note">
                <p>
                    Dr. Shad Lewis, DMD<br />
                    <a href="#">https://preventive.dental</a>
                </p>
            </div>
        </div>
    </body>
</html>
